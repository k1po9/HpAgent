# MCP Server 统一配置
# ============================================================
# 每个 server 块包含：连接参数 + 工具配置（hint / enrich）。
# 新增 MCP 服务器只需改这一个文件。
# ============================================================
#
# ── 连接字段 ─────────────────────────────────────────────
# url              str     MCP 端点 URL（HTTP/SSE 模式）
# description      str     服务描述
# headers          dict    自定义 HTTP 头，支持 ${ENV_VAR}
# request_timeout  float   请求超时秒数（默认 60）
# session_ttl      float   会话过期秒数（HTTP/SSE，默认 100）
# truncate_limit   int     工具输出截断字符数（null=不截断）
# disabled         bool    设为 true 跳过此 server
# required         bool    所有工具始终加载，不参与 RAG 过滤
# result_transform str     结果后处理变换 key（如 extract_content）
# ── stdio 传输专用 ────────────────────────────────────────
# transport        str     设为 "stdio"
# command          str     可执行文件路径（如 node / python）
# args             list    命令行参数
# env              dict    子进程环境变量（增量覆盖）
# cwd              str     子进程工作目录（默认自动指向项目根）
# ── 工具配置 ──────────────────────────────────────────────
# tools.<name>.hint    群聊进度提示（括号表示悄悄话）
# tools.<name>.enrich  追加到 LLM 工具描述的用法提示
#
# ════════════════════════════════════════════════════════

servers:

  # ── tavily 网页搜索 ──────────────────────────────────────
  tavily-mcp:
    url: "https://mcp.api-inference.modelscope.net/1cf7c250530c4e/mcp"
    description: "tavily-websearch-mcp-server"
    required: false
    tools:
      tavily-search:
        hint: "（爪子敲键盘上网冲浪中 🌊）"
        enrich: " 用于搜索网页信息。实时性较强的数据（股价、天气、新闻）请优先调用对应专业工具。"
      tavily-extract:
        hint: "（正在阅读网页内容 📖）"
        enrich: " 用于提取/阅读网页正文内容。"

