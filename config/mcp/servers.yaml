  # ── stock-sdk 股票行情 ───────────────────────────────────
  stock-sdk:
    transport: "stdio"
    command: "node"
    args:
      - "tools/mcp/stock-sdk/dist/cli.js"
      - "mcp"
    description: "国内外股票：A股/港股/美股/基金/期货/期权 行情数据"
    request_timeout: 30
    truncate_limit: 4000
    env:
      STOCK_SDK_MCP_TOOLS: "core"
    tools:
      get_a_share_quotes:
        hint: "（跑去交易所看了眼A股行情 🏦）"
        enrich: " 用于查询A股实时行情：股价、收盘价、涨跌幅、市值、PE/PB等。"
      search:
        hint: "（在股票池里捞了一下 🔍）"
        enrich: " 用于根据名称/代码/拼音搜索股票。精准名搜不到时换简称/拼音重试（如搜不到'麦迪股份'就搜'麦迪'）。"
      get_today_timeline:
        hint: "（拉开分时图看了一眼 📈）"
        enrich: " 用于查看A股当日分时走势。"
      get_history_kline:
        hint: "（翻了翻历史K线 📊）"
        enrich: " 用于查看A股历史K线（日/周/月，含复权）：开高低收、涨跌幅。"
      get_minute_kline:
        hint: "（打开分钟K线看走势 🕯️）"
        enrich: " 用于查看A股分钟K线或当日分时。"
      get_hk_quotes:
        hint: "（跑去港交所瞄了一眼 🇭🇰）"
        enrich: " 用于查询港股实时行情。"
      get_us_quotes:
        hint: "（跨洋看了眼美股 🇺🇸）"
        enrich: " 用于查询美股实时行情。"
      get_fund_quotes:
        hint: "（翻了翻基金净值 💰）"
        enrich: " 用于查询公募基金净值（场内/场外）。"
      get_fund_estimate:
        hint: "（算了算基金估值 🧮）"
        enrich: " 用于查询基金当日实时估值。"
      get_zt_pool:
        hint: "（翻了翻涨停板 📋）"
        enrich: " 用于查看涨停板股票列表（涨停/昨日涨停/炸板/跌停）。"
      get_dragon_tiger_detail:
        hint: "（偷瞄了龙虎榜 🐉）"
        enrich: " 用于查看龙虎榜、游资和机构交易席位。"
      get_northbound_flow_summary:
        hint: "（看了看北向资金动向 🧭）"
        enrich: " 用于查看北向资金/南向资金流入流出概况。"
      get_individual_fund_flow:
        hint: "（追踪了一下资金流向 💸）"
        enrich: " 用于查看个股资金流向历史。"
      get_fund_flow_rank:
        hint: "（看了资金排行榜 🏆）"
        enrich: " 用于查看个股资金流向排行。"
