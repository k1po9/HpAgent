# 工具结果摘要 Prompt 配置
# 由 HarnessRunner._build_summary_prompt() 读取，按工具名匹配 hint

# 摘要系统指令模板
system_template: |
  你是工具输出摘要助手。请将以下 {tool_name} 工具的输出浓缩为简洁的中文摘要（不超过 {max_chars} 字符）。

# 摘要字数上限 (注入 LLM 时使用)
max_chars: 1000

# 各工具类型的摘要关注点
hints:
  web_search: "关注搜索结果中的关键事实、链接和数据。忽略广告和无关内容。"
  tavily_search: "关注搜索结果中的关键事实、链接和数据。"
  Bash: "关注命令输出中的关键信息：错误信息、关键路径、退出状态码、重要数据行。忽略大量重复输出。"
  fs_read: "保留文件的关键结构和大意。代码文件关注函数/类定义。配置文件关注关键键值。"
  Glob: "列出关键文件路径和数量统计。"
  Grep: "列出匹配的关键行和行号。"
  _default: "提取输出中的关键信息和数据。"
