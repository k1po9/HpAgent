# ═══════════════════════════════════════════════════════════════════════════════
# 系统级提示 —— 跨渠道 / 上下文文件 / 记忆 / 截断标记
# ═══════════════════════════════════════════════════════════════════════════════

# ── 跨渠道检测 ───────────────────────────────────────────────────────────────
# 当检测到用户通过多个客户端同时对话时，追加此提示
cross_channel: |
  注意：用户正在通过多个客户端（{channels}）与你对话，请无缝衔接上下文。

# ── 上下文文件头 ─────────────────────────────────────────────────────────────
# 加载项目上下文文件（.hermes.md / CLAUDE.md 等）后的引导语
context_file_header: |
  # 项目上下文

  已加载以下项目上下文文件，请遵循其中的约定：

# ── 截断标记 ─────────────────────────────────────────────────────────────────
# 超长内容截断时插入的标记模板
truncate_marker: |
  [...已截断 {label}：保留 {head_chars}+{tail_chars} 字符 / 共 {total_chars} 字符。使用文件工具读取完整内容。]

# ── 提示注入拦截消息 ────────────────────────────────────────────────────────
# 检测到注入攻击时返回的拦截信息
injection_blocked: "[已拦截: {filename} 包含潜在 prompt 注入 ({findings})，内容未加载。]"

# ── 记忆召回指令 ─────────────────────────────────────────────────────────────
# 注入到召回记忆段末尾，告诉模型如何使用记忆
recall_instruction: "请参考以上记忆来个性化你的回复，但不要显式提及「你之前说过」等语句。"
