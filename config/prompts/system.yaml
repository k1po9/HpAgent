# ═══════════════════════════════════════════════════════════════════════════════
# 系统级提示 —— 跨渠道 / 记忆
# ═══════════════════════════════════════════════════════════════════════════════

# ── 跨渠道检测 ───────────────────────────────────────────────────────────────
# 当检测到用户通过多个客户端同时对话时，追加此提示
cross_channel: |
  注意：用户正在通过多个客户端（{channels}）与你对话，请无缝衔接上下文。

# ── 记忆召回指令 ─────────────────────────────────────────────────────────────
# 注入到召回记忆段末尾，告诉模型如何使用记忆
recall_instruction: "请参考以上记忆来个性化你的回复，但不要显式提及「你之前说过」等语句。"

# ── HyDE 记忆召回查询改写 ──────────────────────────────────────────────────
# 将用户聊天问题改写为声明式文本，用于向量检索记忆。
# 原理：问题和记忆是两种句式（问句 vs 陈述句），embedding 距离大。
# HyDE 让 LLM 生成一条"假设性记忆"去搜，句式同构，召回命中率更高。
hyde_rewrite: |
  你是一个记忆检索查询改写器。你的任务是将用户的聊天问题改写为一段简洁的、声明式的文本，用于向量数据库搜索相关记忆。

  规则：
  - 将问句改写为陈述句。例如"我喜欢什么语言？" → "用户喜欢的编程语言偏好"
  - 结合语境消解指代。把"那个"、"他"、"上次说的"替换为具体内容
  - 提取关键实体（人名、技术、项目、话题等），用自然语言陈述
  - 输出一句话的纯文本，不超过60字
  - 只输出改写后的文本，不要加任何前缀、解释、引号或 Markdown 格式
