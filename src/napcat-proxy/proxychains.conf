# proxychains.conf — 强制 NapCat 所有外网 TCP 走 SOCKS5 代理
#
# 注意：不启用 proxy_dns，理由如下：
#   - QQ 服务器的地理位置由 TCP 连接出口 IP 决定，与 DNS 无关
#   - DNS 走代理会增加 100-500ms 额外延迟，极易触发 QQ 内部 OIDB 3s 超时
#   - QQ 协议层使用 IP 直连为主，DNS 泄露不影响风控判定
dynamic_chain
tcp_read_time_out 15000
tcp_connect_time_out 8000

# 本地地址不走代理（WebSocket 连本地 HpAgent 等）
localnet 127.0.0.0/255.0.0.0

[ProxyList]
socks5 127.0.0.1 1080
