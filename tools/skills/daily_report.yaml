name: daily_report
description: "搜索指定主题的最新新闻，读取报告模板，生成格式化日报"
parameters:
  type: object
  properties:
    topic:
      type: string
      description: "报告主题或关键词"
  required: ["topic"]
pipeline:
  steps:
    - id: search
      tool: tavily-search
      arguments:
        query: "$topic 最新消息"
    - id: read_template
      tool: fs_read
      arguments:
        path: "/workspace/templates/report_template.md"
on_error: continue
timeout_seconds: 60
