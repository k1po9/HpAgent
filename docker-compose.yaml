services:
  # ==================== HpAgent 主服务 ====================
  hpagent:
    build: ./src
    image: hpagent:latest
    ports:
      - "8082:8082"
    environment:
      - TEMPORAL_HOST=temporal:7233
      - HINDSIGHT_URL=http://hindsight:8888
      - WORKSPACE_ROOT=/app/data/workspace
      - REDIS_URL=redis://redis:6379
      - MINIMAX_API_KEY=${MINIMAX_API_KEY}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ./data/workspace:/app/data/workspace   # 用户工作区（宿主机可见）
      - ./data/sessions:/app/data/sessions     # 会话 JSONL 备份（宿主机可见）
      - ./data/logs:/app/data/logs             # 日志文件（宿主机可见）
      - ./config:/app/config:ro                # 配置文件（只读）
    depends_on:
      redis:
        condition: service_healthy
      temporal:
        condition: service_healthy
      hindsight:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped
    # nsjail 需要创建 PID/cgroup/network namespace，必须 privileged
    privileged: true

  # ==================== Redis 会话存储 ====================
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - app-network
    restart: unless-stopped

  # ==================== NapCat QQ 机器人 ====================
  napcat:
    image: mlikiowa/napcat-docker:latest
    environment:
      - NAPCAT_UID=1000
      - NAPCAT_GID=1000
      - TZ=Asia/Shanghai
    ports:
      - "6099:6099"
    volumes:
      - ./data/napcat/data:/app/.napcat       # QQ 登录凭证持久化
      - ./data/napcat/cache:/app/data/cache   # 缓存数据持久化
    networks:
      - app-network
    restart: unless-stopped

  # ==================== Temporal + 数据库 ====================
  temporal-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal
      POSTGRES_DB: temporal
    volumes:
      - temporal-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal -d temporal"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - app-network
    restart: unless-stopped

  temporal:
    image: temporalio/auto-setup:1.26.2
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=temporal
      - POSTGRES_SEEDS=temporal-postgres
    ports:
      - "7233:7233"
    depends_on:
      temporal-postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "tctl", "--address", "localhost:7233", "cluster", "health"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - app-network
    restart: unless-stopped

  temporal-web:
    image: temporalio/ui:2.34.0
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
    ports:
      - "8088:8088"
    depends_on:
      - temporal
    networks:
      - app-network
    restart: unless-stopped

  # ==================== Hindsight 长期记忆 ====================
  hindsight:
    image: ghcr.io/vectorize-io/hindsight:latest
    environment:
      # LLM（对话总结/记忆整合 — 如全用本地可留空，但部分功能会降级）
      - HINDSIGHT_API_LLM_API_KEY=${HINDSIGHT_LLM_API_KEY:-sk-xxx}
      - HINDSIGHT_API_LLM_MODEL=${HINDSIGHT_LLM_MODEL:-gpt-4o-mini}
      # ── 本地 BGE-M3 Embedding（核心：无需云 API key） ──
      - HINDSIGHT_API_EMBEDDINGS_PROVIDER=local
      - HINDSIGHT_API_EMBEDDINGS_LOCAL_MODEL=BAAI/bge-m3
      - HINDSIGHT_API_EMBEDDINGS_LOCAL_NORMALIZE_EMBEDDINGS=true
      # ── 本地 BGE Reranker（检索精度提升 30%+） ──
      - HINDSIGHT_API_RERANKER_PROVIDER=local
      - HINDSIGHT_API_RERANKER_LOCAL_MODEL=BAAI/bge-reranker-v2-m3
      - HINDSIGHT_API_RERANKER_LOCAL_TOP_N=10
      - HINDSIGHT_API_RERANKER_LOCAL_RETURN_TOP_N=5
      # ── 国内 Hugging Face 镜像加速 ──
      - HF_ENDPOINT=https://hf-mirror.com
    ports:
      - "8001:8888"
    volumes:
      - hindsight-data:/home/hindsight/.pg0
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 120s   # 首次启动需下载模型，给 2 分钟
    networks:
      - app-network
    restart: unless-stopped

volumes:
  temporal-pgdata:
  hindsight-data:
  redis-data:

networks:
  app-network:
    driver: bridge
