services:
  # ==================== HpAgent 主服务 ====================
  hpagent:
    build: ./src
    ports:
      - "8082:8082"                   # 宿主机调试：ws://localhost:8082
    environment:
      # 容器内通信（Docker DNS 自动解析服务名）
      - TZ=Asia/Shanghai
      - TEMPORAL_HOST=temporal:7233
      - HINDSIGHT_URL=http://hindsight:8888
      - WORKSPACE_ROOT=/app/.data/workspace
      - REDIS_URL=redis://redis:6379
      - SILICONFLOW_API_KEY=${SILICONFLOW_API_KEY}
      - SILICONFLOW_BASE_URL=${SILICONFLOW_BASE_URL}
      - SILICONFLOW_EMBEDDING_MODEL=${SILICONFLOW_EMBEDDING_MODEL}
      - SILICONFLOW_RERANK_MODEL=${SILICONFLOW_RERANK_MODEL}
      - MINIMAX_API_KEY=${MINIMAX_API_KEY}
      - MIMO_API_KEY=${MIMO_API_KEY}
      - MIMO_API_BASE_URL=${MIMO_API_BASE_URL}
      - MIMO_PRO_MODEL=${MIMO_PRO_MODEL}
      - MIMO_MODEL=${MIMO_MODEL}
      # 官方 QQ 机器人
      - QQ_OFFICIAL_APP_ID=${QQ_OFFICIAL_APP_ID:-}
      - QQ_OFFICIAL_CLIENT_SECRET=${QQ_OFFICIAL_CLIENT_SECRET:-}
      - QQ_OFFICIAL_SANDBOX=${QQ_OFFICIAL_SANDBOX:-false}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ./.data:/app/.data                           # 运行时数据（workspace/sessions/logs/accounts）
      - ./config:/app/config:ro                # 配置文件（只读）
      - ./tools:/app/tools                    # 工具定义 + MCP配置 + ChromaDB向量库
    depends_on:
      redis:
        condition: service_healthy
      temporal:
        condition: service_healthy
      hindsight:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped
    # nsjail 需要创建 PID/cgroup/network namespace，必须 privileged
    privileged: true

  # ==================== Redis 会话存储 ====================
  redis:
    image: redis:7-alpine
    environment:
      - TZ=Asia/Shanghai
    ports:
      - "6379:6379"                   # 宿主机调试：redis://localhost:6379
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - app-network
    restart: unless-stopped

  # ==================== NapCat QQ 机器人 ====================
  # host 网络：避免 Docker bridge NAT 导致长连接被防火墙断开
  #
  # ── 切代理模式：注释 image 行，取消下面 3 处注释 ──
  napcat:
    image: mlikiowa/napcat-docker:latest
    # # build: ./src/napcat-proxy              # <─ 1/3 代理模式
    # # cap_add:
    # #   - NET_ADMIN                           # <─ 2/3 代理模式（iptables 所需）
    network_mode: host
    entrypoint: ["bash", "/cleanup.sh"]               # 清理残留代理规则后启动
    environment:
      - NAPCAT_UID=1000
      - NAPCAT_GID=1000
      - TZ=Asia/Shanghai
      - ACCOUNT=3823104293
      - NAPCAT_QUICK_PASSWORD=1879606@Hb
      - ENABLE_VNC=false
      - ELECTRON_DISABLE_GPU=1
      # # - NO_PROXY=localhost,127.0.0.1,::1
      # # - PROXY_OPTIONAL=false                # <─ 3/3 代理模式（true=代理不可达时降级直连）
    command: ["-q", "3823104293"]
    volumes:
      - ./config/napcat-cleanup.sh:/cleanup.sh:ro
      - ./.data/napcat/QQ:/app/.config/QQ          # QQ NT 设备指纹 + 会话 token 持久化（v4.x 关键）
      - ./.data/napcat/data:/app/.napcat       # QQ 登录凭证持久化
      - ./.data/napcat/cache:/app/data/cache   # 缓存数据持久化
      - ./.data/napcat/config:/app/napcat/config  # 配置文件持久化（passkey 等）
    restart: unless-stopped

  # ==================== Temporal + 数据库 ====================
  temporal-postgres:
    image: postgres:16-alpine
    environment:
      TZ: Asia/Shanghai
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal
      POSTGRES_DB: temporal
    volumes:
      - temporal-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal -d temporal"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - app-network
    restart: unless-stopped

  temporal:
    image: temporalio/auto-setup:1.26.2
    environment:
      - TZ=Asia/Shanghai
      - BIND_ON_IP=0.0.0.0              # 使 tctl healthcheck 能通过 localhost 连接
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=temporal
      - POSTGRES_SEEDS=temporal-postgres
    ports:
      - "7233:7233"                   # 宿主机调试：localhost:7233
    depends_on:
      temporal-postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "tctl", "--address", "localhost:7233", "cluster", "health"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - app-network
    restart: unless-stopped

  temporal-web:
    image: temporalio/ui:2.34.0
    environment:
      - TZ=Asia/Shanghai
      - TEMPORAL_ADDRESS=temporal:7233
    ports:
      - "8088:8088"
    depends_on:
      - temporal
    networks:
      - app-network
    restart: unless-stopped

  # ==================== Hindsight 专用 PostgreSQL（pgvector） ====================
  hindsight-postgres:
    image: pgvector/pgvector:pg16
    environment:
      TZ: Asia/Shanghai
      POSTGRES_USER: hindsight
      POSTGRES_PASSWORD: hindsight
      POSTGRES_DB: hindsight
    # 限制内存防止 OOM kill 导致 WAL recovery 循环
    command: >
      -c shared_buffers=128MB
      -c work_mem=8MB
      -c maintenance_work_mem=64MB
      -c effective_cache_size=256MB
      -c wal_buffers=16MB
      -c max_wal_size=1GB
    volumes:
      - hindsight-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hindsight -d hindsight"]
      interval: 5s
      timeout: 3s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 512m
    networks:
      - app-network
    restart: unless-stopped

  # ==================== Hindsight 长期记忆 ====================
  hindsight:
    image: ghcr.io/vectorize-io/hindsight:0.6.1
    environment:
      - TZ=Asia/Shanghai
      # ── 外部 PostgreSQL（替代内嵌 pg0，避免重启数据损坏） ──
      - HINDSIGHT_API_DATABASE_URL=postgresql://hindsight:hindsight@hindsight-postgres:5432/hindsight
      # LLM（对话总结/记忆提取 — MiniMax OpenAI 兼容接口）
      - HINDSIGHT_API_LLM_PROVIDER=${HINDSIGHT_API_LLM_PROVIDER}
      - HINDSIGHT_API_LLM_BASE_URL=${HINDSIGHT_API_LLM_BASE_URL}
      - HINDSIGHT_API_LLM_API_KEY=${HINDSIGHT_API_LLM_API_KEY}
      - HINDSIGHT_API_LLM_MODEL=${HINDSIGHT_API_LLM_MODEL}
      # ── SiliconFlow 云端 Embedding（OpenAI 兼容） ──
      - HINDSIGHT_API_EMBEDDINGS_PROVIDER=openai
      - HINDSIGHT_API_EMBEDDINGS_OPENAI_API_KEY=${SILICONFLOW_API_KEY}
      - HINDSIGHT_API_EMBEDDINGS_OPENAI_MODEL=${SILICONFLOW_EMBEDDING_MODEL}
      - HINDSIGHT_API_EMBEDDINGS_OPENAI_BASE_URL=${SILICONFLOW_BASE_URL}
      # ── SiliconFlow 云端 Reranker ──
      - HINDSIGHT_API_RERANKER_PROVIDER=siliconflow
      - HINDSIGHT_API_RERANKER_SILICONFLOW_API_KEY=${SILICONFLOW_API_KEY}
      - HINDSIGHT_API_RERANKER_SILICONFLOW_MODEL=${SILICONFLOW_RERANK_MODEL}
      - HINDSIGHT_API_RERANKER_SILICONFLOW_BASE_URL=${SILICONFLOW_BASE_URL}
      # ── 跳过 LLM 验证（避免启动时卡在 API 连通性检查） ──
      - HINDSIGHT_API_SKIP_LLM_VERIFICATION=true
    ports:
      - "8001:8888"                   # 宿主机调试：http://localhost:8001
      - "9999:9999"                   # webui
    volumes:
      - ./scripts/start-all.sh:/app/start-all.sh:ro  # 覆盖镜像内硬编码 300s 超时的启动脚本
    depends_on:
      hindsight-postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1g
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888/health"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s
    networks:
      - app-network
    restart: unless-stopped

volumes:
  temporal-pgdata:
  hindsight-pgdata:
  redis-data:

networks:
  app-network:
    driver: bridge
