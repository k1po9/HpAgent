services:
  # ==================== HpAgent 主服务 ====================
  hpagent:
    build: ./src
    ports:
      - "8082:8082"                   # 宿主机调试：ws://localhost:8082
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    environment:
      # 容器内通信（Docker DNS 自动解析服务名）
      - TZ=Asia/Shanghai
      - TEMPORAL_HOST=temporal:7233
      - HINDSIGHT_URL=http://hindsight:8888
      - WORKSPACE_ROOT=/app/.data/workspace
      - REDIS_URL=redis://redis:6379
      # ── SiliconFlow（Embedding / Rerank / Fast 模型） ──
      - SILICONFLOW_API_KEY=${SILICONFLOW_API_KEY}
      - SILICONFLOW_BASE_URL=${SILICONFLOW_BASE_URL}
      - SILICONFLOW_EMBEDDING_MODEL=${SILICONFLOW_EMBEDDING_MODEL}
      - SILICONFLOW_RERANK_MODEL=${SILICONFLOW_RERANK_MODEL}
      - SILICONFLOW_DeepSeek_R1_0528_Qwen3_8B_MODEL=${SILICONFLOW_DeepSeek_R1_0528_Qwen3_8B_MODEL}
      # ── 阿里云百炼（Fast 模型） ──
      - ALIBABA_BAILIAN_API_KEY=${ALIBABA_BAILIAN_API_KEY}
      - ALIBABA_BAILIAN_BASE_URL=${ALIBABA_BAILIAN_BASE_URL}
      - ALIBABA_BAILIAN_FAST_MODEL=${ALIBABA_BAILIAN_FAST_MODEL}
      # ── MiniMax（Chat 模型） ──
      - MINIMAX_API_KEY=${MINIMAX_API_KEY}
      - MINIMAX_API_BASE_URL=${MINIMAX_API_BASE_URL}
      # ── Mimo（Chat / Fast 主模型） ──
      - MIMO_API_KEY=${MIMO_API_KEY}
      - MIMO_API_BASE_URL=${MIMO_API_BASE_URL}
      - MIMO_PRO_MODEL=${MIMO_PRO_MODEL}
      - MIMO_MODEL=${MIMO_MODEL}
      # 官方 QQ 机器人
      - QQ_OFFICIAL_APP_ID=${QQ_OFFICIAL_APP_ID:-}
      - QQ_OFFICIAL_CLIENT_SECRET=${QQ_OFFICIAL_CLIENT_SECRET:-}
      - QQ_OFFICIAL_SANDBOX=${QQ_OFFICIAL_SANDBOX:-false}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ./.data:/app/.data                           # 运行时数据（workspace/sessions/logs/accounts）
      - ./config:/app/config:ro                # 配置文件（只读）
      - ./tools:/app/tools                    # 工具定义 + MCP配置 + ChromaDB向量库
    depends_on:
      redis:
        condition: service_healthy
      temporal:
        condition: service_healthy
      hindsight:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped
    # privileged: true  # 仅 nsjail 需要，已关闭

  # ==================== Redis 会话存储 ====================
  redis:
    image: redis:7-alpine
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      - TZ=Asia/Shanghai
    ports:
      - "6379:6379"                   # 宿主机调试：redis://localhost:6379
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - app-network
    restart: unless-stopped

  # ==================== NapCat QQ 机器人（代理版） ====================
  # 启动：docker compose --profile proxy up -d
  # 停止：docker compose --profile proxy down
  #
  # 透明代理链路：iptables REDIRECT(UID 1000) → redsocks → SOCKS5(PROXY_HOST:PROXY_PORT)
  napcat-proxy:
    profiles: [proxy]
    build: ./src/napcat-proxy
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"
    cap_add:
      - NET_ADMIN
    network_mode: host
    environment:
      - NAPCAT_UID=1000
      - NAPCAT_GID=1000
      - PROXY_HOST=${PROXY_HOST:-127.0.0.1}
      - PROXY_PORT=${PROXY_PORT:-1080}
      - PROXY_OPTIONAL=${PROXY_OPTIONAL:-false}
      - REDSOCKS_PORT=12345
      - TZ=Asia/Shanghai
      - ACCOUNT=${NAPCAT_ACCOUNT}
      - NAPCAT_QUICK_PASSWORD=${NAPCAT_QUICK_PASSWORD}
      - ENABLE_VNC=false
      - ELECTRON_DISABLE_GPU=1
    volumes:
      - ./.data/napcat/QQ:/app/.config/QQ
      - ./.data/napcat/data:/app/.napcat
      - ./.data/napcat/cache:/app/data/cache
      - ./.data/napcat/config:/app/napcat/config
    restart: unless-stopped

  # ==================== NapCat QQ 机器人（直连版） ====================
  # 启动：docker compose --profile direct up -d
  # 停止：docker compose --profile direct down
  #
  # 不走代理，UID 2000 不会被 iptables 规则拦截
  napcat-direct:
    profiles: [direct]
    image: mlikiowa/napcat-docker:latest
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"
    network_mode: host
    environment:
      - NAPCAT_UID=2000
      - NAPCAT_GID=2000
      - TZ=Asia/Shanghai
      - ACCOUNT=${NAPCAT_ACCOUNT}
      - NAPCAT_QUICK_PASSWORD=${NAPCAT_QUICK_PASSWORD}
      - ENABLE_VNC=false
      - ELECTRON_DISABLE_GPU=1
    volumes:
      - ./.data/napcat/QQ:/app/.config/QQ
      - ./.data/napcat/data:/app/.napcat
      - ./.data/napcat/cache:/app/data/cache
      - ./.data/napcat/config:/app/napcat/config
    restart: unless-stopped

  # ==================== Temporal + 数据库 ====================
  temporal-postgres:
    image: postgres:16-alpine
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"
    environment:
      TZ: Asia/Shanghai
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal
      POSTGRES_DB: temporal
    volumes:
      - temporal-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal -d temporal"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - app-network
    restart: unless-stopped

  temporal:
    image: temporalio/auto-setup:1.26.2
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    environment:
      - TZ=Asia/Shanghai
      - BIND_ON_IP=0.0.0.0              # 使 tctl healthcheck 能通过 localhost 连接
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=temporal
      - POSTGRES_SEEDS=temporal-postgres
    ports:
      - "7233:7233"                   # 宿主机调试：localhost:7233
    depends_on:
      temporal-postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "tctl", "--address", "localhost:7233", "cluster", "health"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - app-network
    restart: unless-stopped

  temporal-web:
    image: temporalio/ui:2.34.0
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      - TZ=Asia/Shanghai
      - TEMPORAL_ADDRESS=temporal:7233
    ports:
      - "8088:8088"
    depends_on:
      - temporal
    networks:
      - app-network
    restart: unless-stopped

  # ==================== Hindsight 专用 PostgreSQL（pgvector） ====================
  hindsight-postgres:
    image: pgvector/pgvector:pg16
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"
    environment:
      TZ: Asia/Shanghai
      POSTGRES_USER: hindsight
      POSTGRES_PASSWORD: hindsight
      POSTGRES_DB: hindsight
    # 限制内存防止 OOM kill 导致 WAL recovery 循环
    command: >
      -c shared_buffers=128MB
      -c work_mem=8MB
      -c maintenance_work_mem=64MB
      -c effective_cache_size=256MB
      -c wal_buffers=16MB
      -c max_wal_size=1GB
    volumes:
      - hindsight-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hindsight -d hindsight"]
      interval: 5s
      timeout: 3s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 512m
    networks:
      - app-network
    restart: unless-stopped

  # ==================== Hindsight 长期记忆 ====================
  hindsight:
    image: ghcr.io/vectorize-io/hindsight:0.6.1
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"
    environment:
      - TZ=Asia/Shanghai
      # ── 外部 PostgreSQL（替代内嵌 pg0，避免重启数据损坏） ──
      - HINDSIGHT_API_DATABASE_URL=postgresql://hindsight:hindsight@hindsight-postgres:5432/hindsight
      # LLM（对话总结/记忆提取 — MiniMax OpenAI 兼容接口）
      - HINDSIGHT_API_LLM_PROVIDER=${HINDSIGHT_API_LLM_PROVIDER}
      - HINDSIGHT_API_LLM_BASE_URL=${HINDSIGHT_API_LLM_BASE_URL}
      - HINDSIGHT_API_LLM_API_KEY=${HINDSIGHT_API_LLM_API_KEY}
      - HINDSIGHT_API_LLM_MODEL=${HINDSIGHT_API_LLM_MODEL}
      # ── SiliconFlow 云端 Embedding（OpenAI 兼容） ──
      - HINDSIGHT_API_EMBEDDINGS_PROVIDER=openai
      - HINDSIGHT_API_EMBEDDINGS_OPENAI_API_KEY=${SILICONFLOW_API_KEY}
      - HINDSIGHT_API_EMBEDDINGS_OPENAI_MODEL=${SILICONFLOW_EMBEDDING_MODEL}
      - HINDSIGHT_API_EMBEDDINGS_OPENAI_BASE_URL=${SILICONFLOW_BASE_URL}
      # ── SiliconFlow 云端 Reranker ──
      - HINDSIGHT_API_RERANKER_PROVIDER=siliconflow
      - HINDSIGHT_API_RERANKER_SILICONFLOW_API_KEY=${SILICONFLOW_API_KEY}
      - HINDSIGHT_API_RERANKER_SILICONFLOW_MODEL=${SILICONFLOW_RERANK_MODEL}
      - HINDSIGHT_API_RERANKER_SILICONFLOW_BASE_URL=${SILICONFLOW_BASE_URL}
      # ── 跳过 LLM 验证（避免启动时卡在 API 连通性检查） ──
      - HINDSIGHT_API_SKIP_LLM_VERIFICATION=true
    ports:
      - "8001:8888"                   # 宿主机调试：http://localhost:8001
      - "9999:9999"                   # webui
    volumes:
      - ./scripts/start-all.sh:/app/start-all.sh:ro  # 覆盖镜像内硬编码 300s 超时的启动脚本
    depends_on:
      hindsight-postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1g
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888/health"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s
    networks:
      - app-network
    restart: unless-stopped

volumes:
  temporal-pgdata:
  hindsight-pgdata:
  redis-data:

networks:
  app-network:
    driver: bridge
